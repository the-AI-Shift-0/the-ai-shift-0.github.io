<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Call Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f7ff;
            color: #111827;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #ffffff;
            border-bottom: 1px solid #ddd6fe;
        }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .header-dot { width: 10px; height: 10px; border-radius: 50%; background: #7c3aed; }
        .header-logo { font-weight: 700; font-size: 15px; color: #111827; letter-spacing: -0.4px; }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .status-badge { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }
        .last-run { font-size: 11px; color: #9ca3af; border-left: 1px solid #e5e7eb; padding-left: 16px; margin-left: 4px; }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .content { max-width: 480px; width: 100%; padding: 0 32px; text-align: center; }

        .loading-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; color: #7c3aed; margin-bottom: 28px;
        }

        .integrations {
            display: flex; gap: 16px; justify-content: center; margin-bottom: 32px;
        }
        .integration-card {
            background: #ffffff; border: 1px solid #e9d5ff; border-radius: 12px;
            padding: 18px 24px; text-align: center; flex: 1; min-width: 110px;
            transition: border-color 0.3s;
        }
        .integration-card.done { border-color: #22c55e; }
        .int-icon { font-size: 22px; margin-bottom: 6px; }
        .int-name { font-size: 12px; color: #6b7280; margin-bottom: 6px; }
        .int-count { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
        .int-status {
            font-size: 11px; font-weight: 700; color: #d1d5db;
            height: 16px; display: flex; align-items: center; justify-content: center;
        }
        .int-status.done { color: #22c55e; }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid #e9d5ff; border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .progress-wrap {
            background: #e9d5ff; border-radius: 99px; height: 4px;
            overflow: hidden; margin-bottom: 16px;
        }
        .progress-bar {
            height: 100%; background: #7c3aed; width: 0%;
            border-radius: 99px; transition: width 1.4s ease;
        }
        .progress-text { font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-dot"></div>
            <div class="header-logo">Sales Call Analyzer</div>
        </div>
        <div class="header-right">
            <div class="status-badge"><div class="status-dot"></div><span>Gong connected</span></div>
            <div class="status-badge"><div class="status-dot"></div><span>CRM connected</span></div>
            <div class="last-run">Last run: Mon, May 11 · 9:02 AM</div>
        </div>
    </div>

    <div class="container">
        <div class="content">
            <div class="loading-label" id="loading-label">Pulling your calls...</div>

            <div class="integrations">
                <div class="integration-card" id="gong-card">
                    <div class="int-icon">🎙️</div>
                    <div class="int-name">Gong</div>
                    <div class="int-count" id="gong-count">47 calls</div>
                    <div class="int-status" id="gong-status"><div class="spinner"></div></div>
                </div>
                <div class="integration-card" id="crm-card">
                    <div class="int-icon">📊</div>
                    <div class="int-name">CRM</div>
                    <div class="int-count" id="crm-count">5 reps</div>
                    <div class="int-status" id="crm-status"><div class="spinner"></div></div>
                </div>
                <div class="integration-card" id="ai-card">
                    <div class="int-icon">🧠</div>
                    <div class="int-name">Analysis</div>
                    <div class="int-count" id="ai-count">Scoring</div>
                    <div class="int-status" id="ai-status"><div class="spinner"></div></div>
                </div>
            </div>

            <div class="progress-wrap">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">Mapping call patterns across your team...</div>
        </div>
    </div>

    <script>
        function markDone(cardId, statusId) {
            document.getElementById(cardId).classList.add('done');
            const s = document.getElementById(statusId);
            s.classList.add('done');
            s.innerHTML = '✓ Pulled';
        }

        setTimeout(() => markDone('gong-card', 'gong-status'), 800);
        setTimeout(() => markDone('crm-card', 'crm-status'), 1500);
        setTimeout(() => {
            document.getElementById('ai-count').textContent = '47 scored';
            markDone('ai-card', 'ai-status');
        }, 2400);

        setTimeout(() => {
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('loading-label').textContent = 'Analysis ready';
            document.getElementById('progress-text').textContent = 'Opening your dashboard...';
        }, 2700);

        setTimeout(() => { window.location.href = 'l1.html'; }, 4200);
    </script>
</body>
</html>
