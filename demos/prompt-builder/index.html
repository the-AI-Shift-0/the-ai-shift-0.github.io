<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Builder - Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7ff;
      color: #111827;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 32px;
      background: #ffffff;
      border-bottom: 1px solid #ddd6fe;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7c3aed;
    }

    .header-logo {
      font-weight: 700;
      font-size: 15px;
      color: #111827;
      letter-spacing: -0.4px;
    }

    .header-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #6b7280;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
    }

    .last-run {
      font-size: 11px;
      color: #9ca3af;
      border-left: 1px solid #e5e7eb;
      padding-left: 16px;
      margin-left: 4px;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      padding: 0 24px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #111827;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .card-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #e9d5ff;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #7c3aed;
      width: 0%;
      transition: width 0.3s ease;
    }

    .card.done .progress-fill {
      width: 100%;
    }

    .card.done .card-icon::after {
      content: " ✓";
      color: #22c55e;
    }

    .ready-message {
      text-align: center;
      font-size: 16px;
      color: #7c3aed;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.6s ease;
      margin-top: 40px;
    }

    .ready-message.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <div class="header-logo">Prompt Builder</div>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="status-dot"></div><span>Loading</span></div>
      <div class="last-run">Initializing</div>
    </div>
  </div>

  <div class="container">
    <div class="title">Initializing</div>
    <div class="subtitle">Loading resources...</div>

    <div class="cards">
      <div class="card" id="card1">
        <div class="card-icon">📚</div>
        <div class="card-content">
          <div class="card-title">Best Practices Library</div>
          <div class="card-desc">14,000+ patterns loaded</div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </div>

      <div class="card" id="card2">
        <div class="card-icon">🗂️</div>
        <div class="card-content">
          <div class="card-title">Use Case Database</div>
          <div class="card-desc">847 business cases</div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="ready-message" id="readyMsg">Ready to build your prompt</div>
  </div>

  <script>
    // Complete card 1 at 0.8s
    setTimeout(() => {
      document.getElementById('card1').classList.add('done');
    }, 800);

    // Complete card 2 at 1.5s
    setTimeout(() => {
      document.getElementById('card2').classList.add('done');
    }, 1500);

    // Show ready message at 2.2s
    setTimeout(() => {
      document.getElementById('readyMsg').classList.add('show');
    }, 2200);

    // Redirect to L1 at 3.5s
    setTimeout(() => {
      window.location.href = 'l1.html';
    }, 3500);
  </script>
</body>
</html>
