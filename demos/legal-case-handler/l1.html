<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Case Handler - Question Interface</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7ff;
      color: #111827;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 32px;
      background: #ffffff;
      border-bottom: 1px solid #ddd6fe;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #7c3aed;
    }

    .header-logo {
      font-weight: 700;
      font-size: 15px;
      color: #111827;
      letter-spacing: -0.4px;
    }

    .header-right {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #6b7280;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
    }

    .last-run {
      font-size: 11px;
      color: #9ca3af;
      border-left: 1px solid #e5e7eb;
      padding-left: 16px;
      margin-left: 4px;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(2px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 1;
      animation: fadeOut 0.8s ease-out forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; pointer-events: none; }
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #ddd6fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .main-content {
      animation: slideIn 0.6s ease-out 0.8s forwards;
      opacity: 0;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .question-section {
      margin-bottom: 48px;
    }

    .question-text {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 24px;
    }

    .chips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .chip {
      background: #ffffff;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      font-weight: 500;
      color: #111827;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .chip:hover {
      border-color: #c4b5fd;
      background: #faf5ff;
    }

    .chip.active {
      background: #7c3aed;
      color: #ffffff;
      border-color: #7c3aed;
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }

    .threats-section {
      background: #ffffff;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      padding: 24px;
    }

    .threats-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .threat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .threat-item:last-child {
      border-bottom: none;
    }

    .threat-text {
      font-size: 13px;
      color: #111827;
      filter: blur(3px);
      user-select: none;
    }

    .threat-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .threat-badge.active {
      background: #fee2e2;
      color: #dc2626;
    }

    .threat-badge.resolved {
      background: #f3f4f6;
      color: #6b7280;
    }

    .threat-date {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-dot"></div>
      <div class="header-logo">Legal Case Handler</div>
    </div>
    <div class="header-right">
      <div class="status-badge"><div class="status-dot"></div><span>Inbox connected</span></div>
      <div class="status-badge"><div class="status-dot"></div><span>Drive connected</span></div>
      <div class="last-run">Last run: Mon, May 12 · 2:14 PM</div>
    </div>
  </div>

  <div class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <div class="container">
    <div class="main-content">
      <div class="question-section">
        <div class="question-text">What would you like me to look at?</div>
        <div class="chips-grid">
          <button class="chip active" onclick="navigateToL2()">Is this threat serious?</button>
          <button class="chip" onclick="alert('Demo shows: Is this threat serious?')">Do I need a lawyer for this?</button>
          <button class="chip" onclick="alert('Demo shows: Is this threat serious?')">Draft a response for me</button>
          <button class="chip" onclick="alert('Demo shows: Is this threat serious?')">What's my legal exposure here?</button>
        </div>
      </div>

      <div class="threats-section">
        <div class="threats-title">Recent threats</div>

        <div class="threat-item">
          <div>
            <div class="threat-text">Recording consent claim - May 12</div>
          </div>
          <span class="threat-badge active">ACTIVE</span>
        </div>

        <div class="threat-item">
          <div>
            <div class="threat-text">Copyright infringement notice - Apr 28</div>
          </div>
          <span class="threat-badge resolved">RESOLVED</span>
        </div>

        <div class="threat-item">
          <div>
            <div class="threat-text">Employee NDA breach threat - Apr 15</div>
          </div>
          <span class="threat-badge resolved">RESOLVED</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    function navigateToL2() {
      window.location.href = 'l2.html';
    }
  </script>
</body>
</html>
