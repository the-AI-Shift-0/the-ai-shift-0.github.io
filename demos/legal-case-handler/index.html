<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legal Case Handler - Loading</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7ff;
      color: #111827;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .loading-content {
      text-align: center;
    }

    .loading-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #111827;
    }

    .loading-subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 40px;
    }

    .integrations {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .integration-card {
      background: #ffffff;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      padding: 24px;
      width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: slideUp 0.6s ease-out forwards;
    }

    .integration-card:nth-child(1) {
      animation-delay: 0.2s;
    }

    .integration-card:nth-child(2) {
      animation-delay: 0.9s;
    }

    .integration-card:nth-child(3) {
      animation-delay: 1.6s;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .integration-icon {
      font-size: 32px;
    }

    .integration-name {
      font-weight: 600;
      font-size: 14px;
      color: #111827;
    }

    .integration-status {
      font-size: 12px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #dc2626;
    }

    .status-indicator.active {
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .progress-section {
      margin-top: 20px;
    }

    .progress-bar-container {
      width: 200px;
      height: 4px;
      background: #ddd6fe;
      border-radius: 2px;
      overflow: hidden;
      margin: 0 auto 12px;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      width: 0%;
      animation: fillProgress 2.7s ease-out forwards;
      border-radius: 2px;
    }

    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    .progress-label {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      min-height: 16px;
    }

    .progress-label.ready {
      animation: fadeIn 0.5s ease-out forwards;
      animation-delay: 2.8s;
      color: #22c55e;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading-content">
      <div class="loading-title">Legal Case Handler</div>
      <div class="loading-subtitle">Analyzing incoming threats...</div>

      <div class="integrations">
        <div class="integration-card">
          <div class="integration-icon">📧</div>
          <div class="integration-name">Inbox</div>
          <div class="integration-status">
            <span class="status-indicator active"></span>
            <span>3 threats</span>
          </div>
        </div>

        <div class="integration-card">
          <div class="integration-icon">📁</div>
          <div class="integration-name">Drive</div>
          <div class="integration-status">
            <span class="status-indicator active"></span>
            <span>12 docs</span>
          </div>
        </div>

        <div class="integration-card">
          <div class="integration-icon">⚖️</div>
          <div class="integration-name">Legal DB</div>
          <div class="integration-status">
            <span class="status-indicator active"></span>
            <span>Scanning</span>
          </div>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-bar-container">
          <div class="progress-bar"></div>
        </div>
        <div class="progress-label" id="progressLabel">Connecting...</div>
        <div class="progress-label ready" id="readyLabel" style="opacity: 0;">Analysis ready • Opening your dashboard...</div>
      </div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('progressLabel').textContent = 'Analysis ready';
      document.getElementById('progressLabel').style.color = '#22c55e';
      document.getElementById('progressLabel').style.fontWeight = '600';
    }, 2700);

    setTimeout(() => {
      window.location.href = 'l1.html';
    }, 4200);
  </script>
</body>
</html>
