<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Caller - New Lead Alert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f7ff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container { width: 100%; max-width: 480px; }
    .alert-card {
      background: #ffffff;
      border: 1px solid #e9d5ff;
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
    }
    .alert-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    .alert-headline {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
      letter-spacing: -0.5px;
    }
    .alert-sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .lead-details {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 32px;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .detail-row:last-child { margin-bottom: 0; }
    .detail-label { color: #9ca3af; font-weight: 500; }
    .detail-value {
      color: #111827;
      font-weight: 500;
      font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    }
    .blurred { filter: blur(5px); user-select: none; }
    .source-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-top: 8px;
    }
    .countdown-container {
      margin-bottom: 32px;
    }
    .countdown-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .countdown-display {
      font-size: 56px;
      font-weight: 700;
      color: #7c3aed;
      text-align: center;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-bottom: 8px;
    }
    .countdown-sub {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
    .status-transition {
      display: none;
      text-align: center;
      margin-bottom: 24px;
    }
    .status-transition.active {
      display: block;
      animation: fadeIn 0.4s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .calling-badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .placed-time {
      font-size: 12px;
      color: #6b7280;
    }
    .pulse-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="alert-card">
      <div class="alert-icon">📞</div>
      <h1 class="alert-headline">New Lead</h1>
      <p class="alert-sub">Your AI Caller is activating to place an outbound call within seconds.</p>

      <div class="lead-details">
        <div class="detail-row">
          <span class="detail-label">Name</span>
          <span class="detail-value blurred">Samantha Mitchell</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Source</span>
          <span class="detail-value">Facebook Ad - High Ticket Program</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Form submitted</span>
          <span class="detail-value">3:47:12 PM - just now</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Phone</span>
          <span class="detail-value blurred">+61 491 570 156</span>
        </div>
      </div>

      <div class="countdown-container">
        <div class="countdown-label">AI Caller activating in</div>
        <div class="countdown-display" id="countdownDisplay">60</div>
        <div class="countdown-sub">seconds</div>
      </div>

      <div class="status-transition" id="statusTransition">
        <div class="calling-badge"><span class="pulse-dot"></span>Calling now...</div>
        <div class="placed-time">Placed call in 47 seconds</div>
      </div>
    </div>
  </div>

  <script>
    let seconds = 60;
    const countdownDisplay = document.getElementById('countdownDisplay');
    const statusTransition = document.getElementById('statusTransition');

    // Accelerated countdown: 60 seconds → 0 in ~3 real seconds
    // Each interval = 50ms, decrement by 1 each time
    const countdownInterval = setInterval(() => {
      seconds--;
      countdownDisplay.textContent = String(seconds).padStart(2, '0');

      if (seconds <= 0) {
        clearInterval(countdownInterval);
        countdownDisplay.parentElement.style.display = 'none';
        statusTransition.classList.add('active');

        // Auto-advance to L1 after 1.5 seconds
        setTimeout(() => {
          window.location.href = 'l1.html';
        }, 1500);
      }
    }, 50);
  </script>
</body>
</html>
